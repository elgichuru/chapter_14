<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Pseudocodes</title>
        <style>
            li:nth-last-child(-n+4){
                background-color: lightblue;
            }
        </style>
    </head>
    <body>
        <ol>
            <li class="red yellow">Apples</li>
            <li class="red green">Grapes</li>
            <li class="yellow">Bananas</li>
            <li class="yellow">Mangoes</li>
            <li class="blue">BlueBerries</li>
            <li class="red">Lychees</li>
            <li class="orange">Oranges</li>
            <li class="yellow">Lemons</li>
            <li class="red">cherries</li>
            <li class="orange">Nectarines</li>
        </ol>

    </body>
</html>
